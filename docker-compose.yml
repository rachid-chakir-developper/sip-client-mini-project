version: "3.9"

services:
  backend:
    build: ./django
    container_name: sip-client_backend_dev
    volumes:
      - ./django:/app
    ports:
      - "9090:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - asterisk
  
  frontend:
    build: ./vue-frontend
    container_name: sip-client_frontend_dev
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_WS_PROXY_TARGET: ws://backend:8000
      VITE_USE_POLLING: "true"
    volumes:
      - ./vue-frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - asterisk

  asterisk:
    image: andrius/asterisk:20
    container_name: asterisk
    restart: unless-stopped
    ports:
      # SIP UDP
      - "5060:5060/udp"

      # SIP TCP
      - "5060:5060/tcp"

      # WebSocket HTTP
      - "8088:8088"

      # WebSocket HTTPS (WSS)
      - "8089:8089"

      # RTP
      - "10000-10100:10000-10100/udp"

    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf
      - ./asterisk/http.conf:/etc/asterisk/http.conf
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf
      - ./asterisk/logger.conf:/etc/asterisk/logger.conf
      - ./asterisk/keys:/etc/asterisk/keys

    networks:
      - voip

networks:
  voip:
    driver: bridge